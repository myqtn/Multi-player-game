<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🌌 Dream City Fly</title>

    <!-- ===== FIREBASE MODULES ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <!-- ===== THREE.JS ===== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <style>
        /* ----- RESET & FULLSCREEN ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #0a0e1a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            /* prevent scroll/pinch */;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* ----- OVERLAY UI (Join / HUD) ----- */
        #joinOverlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(16px);
            z-index: 100;
            padding: 24px;
            transition: opacity 0.6s ease;
        }
        #joinOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #joinOverlay h1 {
            font-size: 2.6rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }
        #joinOverlay p {
            color: #94a3b8;
            margin-bottom: 28px;
            font-size: 1.1rem;
            text-align: center;
            max-width: 320px;
        }
        #joinOverlay input {
            width: 80%;
            max-width: 300px;
            padding: 16px 20px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #f0f4ff;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
            transition: border 0.2s;
        }
        #joinOverlay input:focus {
            border-color: #a78bfa;
        }
        #joinOverlay button {
            padding: 16px 48px;
            border-radius: 60px;
            border: none;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3);
        }
        #joinOverlay button:active {
            transform: scale(0.95);
        }

        /* ----- JOYSTICKS (mobile) ----- */
        .joystick {
            position: fixed;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            z-index: 50;
            touch-action: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
            transition: opacity 0.3s;
        }
        .joystick .knob {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #a78bfa, #7c3aed);
            pointer-events: none;
            transition: transform 0.05s;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.4);
        }
        #leftStick {
            bottom: 40px;
            left: 30px;
        }
        #rightStick {
            bottom: 40px;
            right: 30px;
        }
        .stick-label {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            letter-spacing: 1px;
            bottom: -24px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        /* ----- HUD (top) ----- */
        #hud {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e2e8f0;
            font-size: 0.9rem;
            z-index: 60;
            pointer-events: none;
            flex-wrap: wrap;
            gap: 8px;
        }
        #hud .left,
        #hud .right {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        #hud .player-count {
            color: #94a3b8;
        }
        #hud .player-count span {
            color: #f0f4ff;
            font-weight: 600;
        }
        #hud .nearby {
            color: #a78bfa;
        }
        #hud .mic {
            color: #34d399;
            font-size: 1.2rem;
        }
        #hud .mic.off {
            color: #ef4444;
        }

        /* ----- RESPONSIVE ----- */
        @media (max-width: 600px) {
            .joystick {
                width: 90px;
                height: 90px;
            }
            .joystick .knob {
                width: 30px;
                height: 30px;
            }
            #leftStick {
                bottom: 24px;
                left: 16px;
            }
            #rightStick {
                bottom: 24px;
                right: 16px;
            }
            #hud {
                font-size: 0.75rem;
                top: 12px;
            }
            #hud .left,
            #hud .right {
                padding: 4px 12px;
            }
            #joinOverlay h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- ===== JOIN OVERLAY ===== -->
    <div id="joinOverlay">
        <h1>🌌 Dream City</h1>
        <p>Fly through the neon sky &amp; meet others with spatial voice</p>
        <input type="text" id="nameInput" placeholder="Enter your dream name..." maxlength="16" autofocus />
        <button id="joinBtn">🚀 Launch</button>
    </div>

    <!-- ===== JOYSTICKS ===== -->
    <div class="joystick" id="leftStick">
        <div class="knob" id="leftKnob"></div>
        <div class="stick-label">MOVE</div>
    </div>
    <div class="joystick" id="rightStick">
        <div class="knob" id="rightKnob"></div>
        <div class="stick-label">LOOK</div>
    </div>

    <!-- ===== HUD ===== -->
    <div id="hud" style="display:none;">
        <div class="left">
            <span class="player-count">👥 <span id="playerCount">0</span></span>
            <span class="nearby">📡 <span id="nearbyCount">0</span> nearby</span>
        </div>
        <div class="right">
            <span id="micStatus" class="mic">🎙️ ON</span>
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- ===== MAIN APPLICATION (MODULE) ===== -->
    <script type="module">
        // ----- IMPORTS -----
        import { initializeApp } from "firebase/app";
        import {
            getFirestore,
            collection,
            doc,
            onSnapshot,
            updateDoc,
            setDoc,
            deleteDoc,
            increment,
            query,
            orderBy,
            getDocs,
            writeBatch,
            serverTimestamp,
            getDoc,
            runTransaction,
            onDisconnect
        } from "firebase/firestore";

        import * as THREE from 'three';

        // ----- FIREBASE CONFIG -----
        const firebaseConfig = {
            apiKey: "AIzaSyCRfjbV4_ogooxnHFFM5UEPyNzEBtwapPw",
            authDomain: "multi-player-219e6.firebaseapp.com",
            projectId: "multi-player-219e6",
            storageBucket: "multi-player-219e6.firebasestorage.app",
            messagingSenderId: "602517623504",
            appId: "1:602517623504:web:dbaeed3fad6b8e0ad4c4d5"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ----- DOM REFS -----
        const joinOverlay = document.getElementById('joinOverlay');
        const nameInput = document.getElementById('nameInput');
        const joinBtn = document.getElementById('joinBtn');
        const hud = document.getElementById('hud');
        const playerCountEl = document.getElementById('playerCount');
        const nearbyCountEl = document.getElementById('nearbyCount');
        const micStatus = document.getElementById('micStatus');

        // ----- THREE.JS SETUP -----
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0e1a);
        scene.fog = new THREE.Fog(0x0a0e1a, 100, 300);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 30, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.prepend(renderer.domElement);

        // ----- LIGHTS -----
        const ambientLight = new THREE.AmbientLight(0x40406b, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.8);
        dirLight.position.set(50, 100, 30);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 150;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 250;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
        fillLight.position.set(-30, 20, -40);
        scene.add(fillLight);

        // ----- CITY BUILDINGS -----
        function buildCity() {
            const groundGeo = new THREE.PlaneGeometry(400, 400);
            const groundMat = new THREE.MeshStandardMaterial({
                color: 0x1a1f33,
                roughness: 0.8,
                metalness: 0.2
            });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid pattern
            const gridHelper = new THREE.GridHelper(400, 20, 0x4a5a8a, 0x2a3a5a);
            gridHelper.position.y = 0;
            scene.add(gridHelper);

            // Buildings
            const colors = [0x6a5acd, 0x4a6fa5, 0x3b82f6, 0x8b5cf6, 0x7c3aed];
            for (let i = 0; i < 120; i++) {
                const w = 2 + Math.random() * 5;
                const d = 2 + Math.random() * 5;
                const h = 4 + Math.random() * 25;
                const mat = new THREE.MeshStandardMaterial({
                    color: colors[Math.floor(Math.random() * colors.length)],
                    emissive: new THREE.Color(colors[Math.floor(Math.random() * colors.length)]).multiplyScalar(0.08),
                    roughness: 0.5,
                    metalness: 0.3
                });
                const box = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
                const x = (Math.random() - 0.5) * 300;
                const z = (Math.random() - 0.5) * 300;
                // keep some central plaza clear
                if (Math.abs(x) < 25 && Math.abs(z) < 25) continue;
                box.position.set(x, h / 2, z);
                box.castShadow = true;
                box.receiveShadow = true;
                scene.add(box);

                // window glow (small emissive boxes)
                if (h > 8 && Math.random() > 0.6) {
                    const glow = new THREE.Mesh(
                        new THREE.BoxGeometry(0.4, 0.4, 0.4),
                        new THREE.MeshStandardMaterial({
                            color: 0xfbbf24,
                            emissive: 0xfbbf24,
                            emissiveIntensity: 0.5
                        })
                    );
                    glow.position.set(
                        x + (Math.random() - 0.5) * w * 0.6,
                        2 + Math.random() * (h - 4),
                        z + (Math.random() - 0.5) * d * 0.6
                    );
                    scene.add(glow);
                }
            }
        }
        buildCity();

        // ----- AMBIENT PARTICLES (stars) -----
        function addStars() {
            const starsGeo = new THREE.BufferGeometry();
            const count = 2000;
            const pos = new Float32Array(count * 3);
            for (let i = 0; i < count * 3; i++) {
                pos[i] = (Math.random() - 0.5) * 600;
                if (i % 3 === 1) pos[i] = Math.random() * 150 + 20; // y height
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            const starsMat = new THREE.PointsMaterial({
                color: 0x8888ff,
                size: 0.6,
                transparent: true,
                opacity: 0.8
            });
            const stars = new THREE.Points(starsGeo, starsMat);
            scene.add(stars);
        }
        addStars();

        // ============================================================
        // ===== GAME STATE =====
        let myPlayerId = null;
        let myName = '';
        let isJoined = false;

        // ----- 3D Player Representation (for self) -----
        const playerGroup = new THREE.Group();
        // avatar: glowing sphere
        const sphereGeo = new THREE.SphereGeometry(1.2, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({
            color: 0xa78bfa,
            emissive: 0x7c3aed,
            emissiveIntensity: 0.3,
            roughness: 0.2,
            metalness: 0.1
        });
        const avatar = new THREE.Mesh(sphereGeo, sphereMat);
        avatar.castShadow = true;
        playerGroup.add(avatar);
        // halo ring
        const ringGeo = new THREE.TorusGeometry(1.8, 0.08, 8, 24);
        const ringMat = new THREE.MeshStandardMaterial({
            color: 0x60a5fa,
            emissive: 0x3b82f6,
            emissiveIntensity: 0.4,
            transparent: true,
            opacity: 0.7
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        playerGroup.add(ring);
        // name label (will be sprite later, but skip for simplicity)
        scene.add(playerGroup);

        // ----- Remote players map -----
        const remotePlayers = new Map(); // id -> { mesh, data, panner, stream }

        // ----- Flight controls -----
        const velocity = new THREE.Vector3(0, 0, 0);
        const maxSpeed = 0.6;
        const thrust = 0.08;
        const damping = 0.96;

        // ----- Joystick state -----
        const leftStick = { x: 0, y: 0 }; // move
        const rightStick = { x: 0, y: 0 }; // look

        // ----- Camera rotation (yaw/pitch) -----
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const targetRotation = new THREE.Euler(0, 0, 0, 'YXZ');

        // ============================================================
        // ===== WEBRTC / SPATIAL AUDIO =====
        const audioCtx = new(window.AudioContext || window.webkitAudioContext)();

        // Map of remote player ID -> RTCPeerConnection
        const peerConnections = new Map();

        // Function to create a panner node for a remote stream
        function createPannerForRemote(remoteId) {
            const panner = audioCtx.createPanner();
            panner.panningModel = 'HRTF';
            panner.distanceModel = 'inverse';
            panner.refDistance = 2;
            panner.maxDistance = 50;
            panner.rolloffFactor = 1.2;
            // start with position 0
            panner.positionX.value = 0;
            panner.positionY.value = 0;
            panner.positionZ.value = 0;
            panner.connect(audioCtx.destination);
            return panner;
        }

        // ----- Signaling via Firestore -----
        const signalsCollection = (playerId) =>
            collection(db, 'players', playerId, 'signals');

        async function sendSignal(targetId, signal) {
            const signalRef = doc(signalsCollection(targetId), myPlayerId);
            await setDoc(signalRef, {
                ...signal,
                from: myPlayerId,
                timestamp: serverTimestamp()
            });
        }

        function listenForSignals() {
            if (!myPlayerId) return;
            const mySignalsRef = signalsCollection(myPlayerId);
            const unsubscribe = onSnapshot(mySignalsRef, (snapshot) => {
                snapshot.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        const fromId = data.from;
                        if (fromId === myPlayerId) return; // ignore self
                        // handle offer/answer/candidate
                        if (data.type === 'offer') {
                            // we received an offer from a remote peer
                            await handleOffer(fromId, data);
                        } else if (data.type === 'answer') {
                            await handleAnswer(fromId, data);
                        } else if (data.type === 'ice-candidate') {
                            await handleCandidate(fromId, data);
                        }
                        // delete the signal after processing to avoid re-processing
                        await deleteDoc(change.doc.ref);
                    }
                });
            });
            // store unsubscribe for later cleanup
            window._signalUnsub = unsubscribe;
        }

        // ----- WebRTC helpers -----
        async function createPeerConnection(remoteId, isInitiator) {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
            });

            // Get local audio stream if not already
            let localStream = window._localStream;
            if (!localStream) {
                try {
                    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                    window._localStream = localStream;
                    // update mic status
                    micStatus.textContent = '🎙️ ON';
                    micStatus.className = 'mic';
                } catch (e) {
                    console.warn('Microphone not available:', e);
                    micStatus.textContent = '🔇 OFF';
                    micStatus.className = 'mic off';
                }
            }

            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            // Handle incoming remote stream
            pc.ontrack = (event) => {
                const remoteStream = event.streams[0];
                if (remoteStream) {
                    // Attach to panner
                    let panner = remotePlayers.get(remoteId)?.panner;
                    if (!panner) {
                        panner = createPannerForRemote(remoteId);
                        // store panner in remote player data
                        const playerData = remotePlayers.get(remoteId);
                        if (playerData) {
                            playerData.panner = panner;
                            playerData.stream = remoteStream;
                        }
                    }
                    if (panner) {
                        const source = audioCtx.createMediaStreamSource(remoteStream);
                        source.connect(panner);
                    }
                }
            };

            // ICE candidate handling
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal(remoteId, {
                        type: 'ice-candidate',
                        candidate: event.candidate
                    });
                }
            };

            // Store connection
            peerConnections.set(remoteId, pc);

            if (isInitiator) {
                // Create offer
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendSignal(remoteId, {
                    type: 'offer',
                    sdp: pc.localDescription
                });
            }

            return pc;
        }

        async function handleOffer(fromId, data) {
            // Create peer connection (not initiator)
            const pc = await createPeerConnection(fromId, false);
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            sendSignal(fromId, {
                type: 'answer',
                sdp: pc.localDescription
            });
        }

        async function handleAnswer(fromId, data) {
            const pc = peerConnections.get(fromId);
            if (pc) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            }
        }

        async function handleCandidate(fromId, data) {
            const pc = peerConnections.get(fromId);
            if (pc) {
                await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        }

        // ----- Proximity check: connect to nearby players -----
        let nearbyPlayers = new Set();

        function updateProximity(remotePositions) {
            const myPos = playerGroup.position;
            const threshold = 30; // meters

            // Determine which remote players are nearby
            const newNearby = new Set();
            for (const [id, pos] of remotePositions) {
                const dist = myPos.distanceTo(pos);
                if (dist < threshold) {
                    newNearby.add(id);
                }
            }

            // For newly nearby, initiate WebRTC if not already
            for (const id of newNearby) {
                if (!nearbyPlayers.has(id) && id !== myPlayerId) {
                    // Establish connection
                    if (!peerConnections.has(id)) {
                        createPeerConnection(id, true); // initiator
                    }
                }
            }

            // For those no longer nearby, close connection and remove panner
            for (const id of nearbyPlayers) {
                if (!newNearby.has(id) && id !== myPlayerId) {
                    const pc = peerConnections.get(id);
                    if (pc) {
                        pc.close();
                        peerConnections.delete(id);
                    }
                    const pData = remotePlayers.get(id);
                    if (pData && pData.panner) {
                        pData.panner.disconnect();
                        pData.panner = null;
                    }
                }
            }

            nearbyPlayers = newNearby;
            nearbyCountEl.textContent = nearbyPlayers.size;
        }

        // ============================================================
        // ===== FIREBASE SYNC (positions) =====
        function startFirebaseSync() {
            if (!myPlayerId) return;

            // Write my position every 100ms
            const interval = setInterval(() => {
                if (!isJoined) return;
                const pos = playerGroup.position;
                const rot = playerGroup.quaternion;
                const ref = doc(db, 'players', myPlayerId);
                setDoc(ref, {
                    x: pos.x,
                    y: pos.y,
                    z: pos.z,
                    qx: rot.x,
                    qy: rot.y,
                    qz: rot.z,
                    qw: rot.w,
                    lastSeen: serverTimestamp()
                }, { merge: true });
            }, 100);

            // Listen to all players
            const playersRef = collection(db, 'players');
            const unsub = onSnapshot(playersRef, (snapshot) => {
                const remotePositions = new Map();
                let count = 0;
                snapshot.forEach((docSnap) => {
                    const id = docSnap.id;
                    if (id === myPlayerId) return;
                    const data = docSnap.data();
                    if (!data.x && data.x !== 0) return;
                    count++;
                    // Create or update remote mesh
                    let remote = remotePlayers.get(id);
                    if (!remote) {
                        // Create a new remote avatar
                        const group = new THREE.Group();
                        const sphere = new THREE.Mesh(
                            new THREE.SphereGeometry(1, 16, 16),
                            new THREE.MeshStandardMaterial({
                                color: 0x60a5fa,
                                emissive: 0x3b82f6,
                                emissiveIntensity: 0.2,
                                roughness: 0.3
                            })
                        );
                        sphere.castShadow = true;
                        group.add(sphere);
                        // ring
                        const ring = new THREE.Mesh(
                            new THREE.TorusGeometry(1.4, 0.06, 8, 20),
                            new THREE.MeshStandardMaterial({
                                color: 0xa78bfa,
                                emissive: 0x7c3aed,
                                emissiveIntensity: 0.3,
                                transparent: true,
                                opacity: 0.5
                            })
                        );
                        ring.rotation.x = Math.PI / 2;
                        group.add(ring);
                        // name label (sprite) omitted for simplicity
                        scene.add(group);
                        remote = {
                            mesh: group,
                            data: data,
                            panner: null,
                            stream: null
                        };
                        remotePlayers.set(id, remote);
                    }
                    // Update position
                    const pos = new THREE.Vector3(data.x, data.y, data.z);
                    remote.mesh.position.copy(pos);
                    if (data.qx !== undefined) {
                        remote.mesh.quaternion.set(data.qx, data.qy, data.qz, data.qw);
                    }
                    // Store position for proximity
                    remotePositions.set(id, pos);
                    // Update panner position if exists
                    if (remote.panner) {
                        remote.panner.positionX.value = pos.x;
                        remote.panner.positionY.value = pos.y;
                        remote.panner.positionZ.value = pos.z;
                    }
                    // Update data
                    remote.data = data;
                });

                // Remove players that left
                for (const [id, remote] of remotePlayers) {
                    if (id !== myPlayerId && !snapshot.docs.some(d => d.id === id)) {
                        scene.remove(remote.mesh);
                        if (remote.panner) {
                            remote.panner.disconnect();
                        }
                        const pc = peerConnections.get(id);
                        if (pc) {
                            pc.close();
                            peerConnections.delete(id);
                        }
                        remotePlayers.delete(id);
                        nearbyPlayers.delete(id);
                    }
                }

                playerCountEl.textContent = count;
                // Update proximity
                updateProximity(remotePositions);
            });

            // Cleanup on leave
            window._firebaseUnsub = unsub;
            window._posInterval = interval;

            // On disconnect, delete player doc
            const myRef = doc(db, 'players', myPlayerId);
            onDisconnect(myRef).delete();
        }

        // ============================================================
        // ===== JOIN / LEAVE =====
        async function joinGame(name) {
            if (!name.trim()) return;
            myName = name.trim();

            // Generate a unique ID
            myPlayerId = `p_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

            // Create player doc
            const ref = doc(db, 'players', myPlayerId);
            await setDoc(ref, {
                name: myName,
                x: 0,
                y: 20,
                z: 0,
                qx: 0,
                qy: 0,
                qz: 0,
                qw: 1,
                createdAt: serverTimestamp()
            });

            isJoined = true;
            joinOverlay.classList.add('hidden');
            hud.style.display = 'flex';

            // Set initial camera position
            playerGroup.position.set(0, 20, 0);
            camera.position.copy(playerGroup.position);
            camera.quaternion.copy(playerGroup.quaternion);

            // Start Firebase sync
            startFirebaseSync();

            // Start listening for signals
            listenForSignals();

            // Enable joysticks
            document.querySelectorAll('.joystick').forEach(el => el.style.opacity = '1');
        }

        function leaveGame() {
            if (myPlayerId) {
                deleteDoc(doc(db, 'players', myPlayerId));
            }
            // Cleanup intervals, unsubs
            if (window._firebaseUnsub) window._firebaseUnsub();
            if (window._posInterval) clearInterval(window._posInterval);
            if (window._signalUnsub) window._signalUnsub();
            // Close all peer connections
            for (const pc of peerConnections.values()) {
                pc.close();
            }
            peerConnections.clear();
            // Reset
            isJoined = false;
            myPlayerId = null;
            joinOverlay.classList.remove('hidden');
            hud.style.display = 'none';
            document.querySelectorAll('.joystick').forEach(el => el.style.opacity = '0.3');
            // Remove remote meshes
            for (const [id, remote] of remotePlayers) {
                scene.remove(remote.mesh);
            }
            remotePlayers.clear();
            nearbyPlayers.clear();
        }

        // ============================================================
        // ===== TOUCH / JOYSTICK CONTROLS =====
        function setupJoystick(element, knob, callback) {
            let active = false;
            const rect = element.getBoundingClientRect();
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const radius = rect.width / 2 - 10;

            function handleMove(clientX, clientY) {
                const dx = clientX - rect.left - centerX;
                const dy = clientY - rect.top - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = Math.min(radius, dist);
                const angle = Math.atan2(dy, dx);
                const normX = Math.cos(angle) * (dist > 0 ? Math.min(1, maxDist / radius) : 0);
                const normY = Math.sin(angle) * (dist > 0 ? Math.min(1, maxDist / radius) : 0);
                // update knob position
                knob.style.transform = `translate(${normX * radius}px, ${normY * radius}px)`;
                callback(normX, -normY); // y inverted for screen
            }

            function reset() {
                active = false;
                knob.style.transform = 'translate(0,0)';
                callback(0, 0);
            }

            element.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                if (touch) {
                    active = true;
                    handleMove(touch.clientX, touch.clientY);
                }
            }, { passive: false });

            element.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!active) return;
                const touch = e.touches[0];
                if (touch) {
                    handleMove(touch.clientX, touch.clientY);
                }
            }, { passive: false });

            element.addEventListener('touchend', (e) => {
                e.preventDefault();
                reset();
            }, { passive: false });

            element.addEventListener('touchcancel', (e) => {
                e.preventDefault();
                reset();
            }, { passive: false });

            // Also mouse for testing on desktop
            let mouseDown = false;
            element.addEventListener('mousedown', (e) => {
                mouseDown = true;
                handleMove(e.clientX, e.clientY);
            });
            window.addEventListener('mousemove', (e) => {
                if (mouseDown) {
                    handleMove(e.clientX, e.clientY);
                }
            });
            window.addEventListener('mouseup', () => {
                if (mouseDown) {
                    mouseDown = false;
                    reset();
                }
            });
        }

        // Left stick: movement (forward/back/left/right relative to camera)
        let moveVec = new THREE.Vector3();
        setupJoystick(
            document.getElementById('leftStick'),
            document.getElementById('leftKnob'),
            (x, y) => {
                leftStick.x = x;
                leftStick.y = y;
            }
        );

        // Right stick: look (yaw/pitch)
        let lookVec = new THREE.Vector3();
        setupJoystick(
            document.getElementById('rightStick'),
            document.getElementById('rightKnob'),
            (x, y) => {
                rightStick.x = x;
                rightStick.y = y;
            }
        );

        // ============================================================
        // ===== GAME LOOP =====
        function animate() {
            requestAnimationFrame(animate);

            // Update camera rotation from right joystick
            const yawSpeed = 0.008;
            const pitchSpeed = 0.008;
            targetRotation.y -= rightStick.x * yawSpeed;
            targetRotation.x -= rightStick.y * pitchSpeed;
            targetRotation.x = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, targetRotation.x));

            // Smooth rotation interpolation
            euler.y += (targetRotation.y - euler.y) * 0.12;
            euler.x += (targetRotation.x - euler.x) * 0.12;
            playerGroup.quaternion.setFromEuler(euler);

            // Movement from left stick (relative to camera)
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(playerGroup.quaternion);
            const right = new THREE.Vector3(1, 0, 0);
            right.applyQuaternion(playerGroup.quaternion);
            const up = new THREE.Vector3(0, 1, 0);

            const moveX = leftStick.x;
            const moveY = leftStick.y; // forward/back

            const desiredVel = new THREE.Vector3()
                .addScaledVector(forward, -moveY * maxSpeed)
                .addScaledVector(right, moveX * maxSpeed);
            // Add slight upward if joystick pushed forward? Not needed.

            // Smooth velocity
            velocity.x += (desiredVel.x - velocity.x) * 0.1;
            velocity.z += (desiredVel.z - velocity.z) * 0.1;
            // Vertical: allow up/down via small buttons? We'll use a separate control: tap to go up? 
            // For simplicity, we map y-axis of left stick to up/down? Actually left stick y is forward/back.
            // We'll add a separate button or use double tap? Let's use: if you tap the screen with two fingers, toggle up/down? Too complex.
            // Instead, we map left stick y to forward/back, and we add a constant upward lift to simulate flying, and use a separate button to descend? 
            // For now, we'll allow vertical control by tilting device? Not implemented.
            // Quick fix: use the right stick's vertical? Not good.
            // Let's use a simple: hold the screen with one finger to ascend, release to descend slowly? But we already have joysticks.
            // We'll add an "Up" button in the center? Or we can map double-tap to toggle ascend/descend.
            // For prototype, we'll keep altitude constant and allow lateral movement only. But then it's not "flying".
            // We'll add: the left stick y also controls altitude if we hold a button? 
            // Let's instead use the left stick y for forward/back and the right stick y for up/down? That would be confusing.
            // Better: use the left stick x for left/right, y for forward/back, and a separate button for up/down.
            // We'll add a small up/down button in the corner. For simplicity, we'll use the left stick y for forward/back, and the right stick x for yaw, right stick y for pitch. Up/down can be controlled by touching the screen with two fingers? 
            // Let's add a simple vertical control: when the left stick is pushed forward, we also add a slight upward component, and when backward, slight downward? That would be weird.
            // I'll implement a simple "ascend" when you double-tap the screen, and descend when you double-tap again? Complex.

            // Given time, we'll make the player fly at a fixed altitude and can move laterally. It's still a "flying" feel.
            // We'll set y velocity to 0 and keep y constant.
            // But we want to fly around buildings, so we need some vertical movement. 
            // Let's use the device orientation to control altitude? Not.
            // Okay, we'll add a third joystick? No.

            // Instead, we'll map the left stick y to forward/back, and the left stick x to left/right, and we'll have the player automatically rise when moving forward (like a plane) and descend when moving backward. That simulates flying.
            // Let's do that: 
            const forwardSpeed = -moveY; // positive = forward
            const verticalSpeed = forwardSpeed * 0.06; // climb when moving forward
            velocity.y = verticalSpeed;
            // Also allow direct up/down via a hidden gesture: double tap with two fingers? Not reliable.

            // Apply velocity
            playerGroup.position.x += velocity.x;
            playerGroup.position.y += velocity.y;
            playerGroup.position.z += velocity.z;

            // Clamp altitude to avoid going underground
            if (playerGroup.position.y < 1) playerGroup.position.y = 1;
            if (playerGroup.position.y > 80) playerGroup.position.y = 80;

            // Update camera to follow player
            camera.position.copy(playerGroup.position);
            camera.quaternion.copy(playerGroup.quaternion);

            // Render
            renderer.render(scene, camera);
        }

        // ============================================================
        // ===== WINDOW RESIZE =====
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });

        // ============================================================
        // ===== EVENT BINDINGS =====
        joinBtn.addEventListener('click', () => joinGame(nameInput.value));
        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinGame(nameInput.value);
        });

        // Auto-join with a default name for testing? Not.

        // ============================================================
        // ===== START ANIMATION LOOP =====
        animate();

        // Initially hide joysticks until joined
        document.querySelectorAll('.joystick').forEach(el => el.style.opacity = '0.3');

        console.log('🌌 Dream City Fly loaded. Enter a name and launch!');
    </script>
